services:
  - type: web
    name: my-flask-app  # अपनी ऐप का नाम दें
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PORT
        value: 5000
        
my_project/
├── app.py          # Main Flask file
├── static/
│   ├── css/
│   ├── js/
│   └── images/
├── templates/
│   ├── base.html
│   ├── index.html
│   └── other_files.html
├── .env            # Configuration file
├── .gitignore
├── requirements.txt
└── render.yaml     # Render's settings file
