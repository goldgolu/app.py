#game.html
{% extends "base.html" %}
{% block title %}Game Interface{% endblock %}
{% block content %}
    <h2>Game Interface</h2>
    <p>Play and earn rewards!</p>
    <div class="game-container">
        <div class="game-stats">
            <p>Coins: <span id="coins">1000</span></p>
            <p>Level: <span id="level">1</span></p>
        </div>
        <button id="play-btn" class="btn">Play Now</button>
    </div>
{% endblock %}
