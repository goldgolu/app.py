<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PAWS RUNNING Game{% endblock %}</title>

    <!-- CSS File for Styling -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/png">

    <!-- Google Fonts (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    {% block extra_head %}{% endblock %}
</head>
<body style="font-family: 'Poppins', sans-serif;">
    <header>
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="PAWS RUNNING Logo" class="logo">
        <h1>PAWS RUNNING Game</h1>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2024 PAWS RUNNING. All rights reserved.</p>
    </footer>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

    <!-- Optional: Example of an image in the footer or anywhere else -->
    <!-- <img src="{{ url_for('static', filename='images/footer-image.png') }}" alt="Footer Image"> -->
</body>
</html>
